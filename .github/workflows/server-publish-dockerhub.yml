name: Deploy BitstratServer Application to dockerhub

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker image version (example: v1.0.0)'
        required: true
        type: string

env:
  PROJECT: bitstrat
  IMAGE_NAME: xuehuiz/bitstrat-server

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ 设置短 SHA
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV
      - name: Set VERSION
        run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
      # 3️⃣ JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 4️⃣ Maven 缓存
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Cache result
        run: echo "Cache hit? -> ${{ steps.maven-cache.outputs.cache-hit }}"
      # 5️⃣ Maven 构建
      - name: Build with Maven
        run:  mvn -T 1C clean package -DskipTests -Pcloudpro

      # 6️⃣ 登录 Harbor
      - name: Login Harbor
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      # 7️⃣ 构建并推送镜像（关键）
      - name: Build & Push Docker image
        run: |
          mkdir ./ruoyi-admin/skywalking-agent/
          cp -r ./script/skyWalking/skywalking-agent/* ./ruoyi-admin/skywalking-agent/
          cd ./ruoyi-admin
          echo "=== skywalking-agent 内容 ==="
          find skywalking-agent/ -type f -name "*.jar"
          docker build \
            -t $IMAGE_NAME:$VERSION \
            -t $IMAGE_NAME:latest \
            .
          docker push \
            $IMAGE:$VERSION

          docker push \
            $IMAGE:latest

      # 8️⃣ 通知服务器 / Helm 更新
#      - name: Notify server to update
#        run: |
#          curl -k -X POST \
#          "你的webhook地址?tag=${SHORT_SHA}"
