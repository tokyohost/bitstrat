name: Deploy BitstratGateway Application

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.HARBOR_URL }}
  PROJECT: bitstrat
  IMAGE_NAME: bitstrat-gateway

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ 设置短 SHA
      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      # 3️⃣ JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # 4️⃣ Maven 缓存
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Cache result
        run: echo "Cache hit? -> ${{ steps.maven-cache.outputs.cache-hit }}"
      # 5️⃣ Maven 构建
      - name: Build with Maven
        run:  mvn -T 1C clean package -DskipTests -Pcloudpro

      # 6️⃣ 登录 Harbor
      - name: Login Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # 7️⃣ 构建并推送镜像（关键）
      - name: Build & Push Docker image
        run: |
          mkdir ./ruoyi-extend/gateway/skywalking-agent/
          cp -r ./script/skyWalking/skywalking-agent/* ./ruoyi-extend/gateway/skywalking-agent/
          cd ./ruoyi-extend/gateway
          echo "=== skywalking-agent 内容 ==="
          find skywalking-agent/ -type f -name "*.jar"
          docker build \
            -t $REGISTRY/$PROJECT/$IMAGE_NAME:${SHORT_SHA} \
            -t $REGISTRY/$PROJECT/$IMAGE_NAME:latest \
            .
          docker push \
            $REGISTRY/$PROJECT/$IMAGE_NAME:${SHORT_SHA}

          docker push \
            $REGISTRY/$PROJECT/$IMAGE_NAME:latest

      # 8️⃣ 通知服务器 / Helm 更新
#      - name: Notify server to update
#        run: |
#          curl -k -X POST \
#          "你的webhook地址?tag=${SHORT_SHA}"
